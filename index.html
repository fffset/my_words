<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelime Kartları</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #aaa;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --green: #1a7a4a; --green-bg: #eaf6ee;
    --red: #c0392b; --red-bg: #fdf0ee;
    --blue: #1a5fa8; --blue-bg: #e8f0fb;
    --radius: 10px; --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f2f2f7; --text2: #aeaeb2; --text3: #6e6e73;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green: #30d158; --green-bg: #0d2e1a;
      --red: #ff453a; --red-bg: #2e0e0b;
      --blue: #64a8f5; --blue-bg: #0c1f3a;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  #app { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .stats-bar { display: flex; gap: 6px; }
  .stat { font-size: 12px; padding: 4px 10px; border-radius: 99px; background: var(--bg2); color: var(--text2); }
  .stat span { font-weight: 600; color: var(--text); }

  .save-indicator { font-size: 11px; color: var(--text3); text-align: right; margin-bottom: 0.5rem; min-height: 16px; transition: color 0.3s; }
  .save-indicator.saving { color: var(--blue); }
  .save-indicator.saved { color: var(--green); }
  .save-indicator.error { color: var(--red); }

  .tabs { display: flex; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .tab { padding: 9px 18px; font-size: 14px; cursor: pointer; color: var(--text2); border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; transition: all 0.15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 99px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--text); transition: width 0.3s ease; }
  .queue-info { font-size: 12px; color: var(--text3); text-align: center; margin-bottom: 0.75rem; }
  .session-bar { display: flex; gap: 8px; justify-content: center; margin-bottom: 1rem; }
  .session-stat { font-size: 12px; padding: 3px 10px; border-radius: 99px; }
  .session-stat.c { background: var(--green-bg); color: var(--green); }
  .session-stat.w { background: var(--red-bg); color: var(--red); }

  .card-wrap { margin-bottom: 1rem; cursor: pointer; user-select: none; }
  .card-face { width: 100%; min-height: 280px; border-radius: var(--radius-lg); border: 1px solid var(--border); background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.75rem 1.5rem; box-sizing: border-box; transition: opacity 0.15s; }

  .badge-new { font-size: 11px; font-weight: 600; padding: 3px 10px; background: var(--blue-bg); color: var(--blue); border-radius: 99px; margin-bottom: 1rem; }
  .audio-btn { width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--border2); background: var(--bg2); cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; transition: background 0.15s; }
  .audio-btn:hover { background: var(--bg3); }
  .audio-btn svg { width: 20px; height: 20px; fill: var(--text2); }
  .no-audio { font-size: 11px; color: var(--text3); margin-bottom: 1rem; }
  .word { font-size: 40px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.2; }
  .flip-hint { font-size: 12px; color: var(--text3); margin-top: 1rem; }
  .tr-label { font-size: 12px; color: var(--text3); margin-bottom: 0.75rem; }
  .translations { font-size: 20px; font-weight: 400; color: var(--text); text-align: center; line-height: 1.6; max-height: 260px; overflow-y: auto; width: 100%; }

  .actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .btn { padding: 11px 28px; border-radius: var(--radius); border: 1px solid var(--border2); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn:active { transform: scale(0.96); }
  .btn-wrong { background: var(--red-bg); color: var(--red); border-color: var(--red); }
  .btn-hard { background: #fff8e6; color: #b06000; border-color: #e0a020; }
  @media (prefers-color-scheme: dark) { .btn-hard { background: #2a1f00; color: #f0b030; border-color: #c07010; } }
  .btn-correct { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .btn-skip { background: var(--bg2); color: var(--text2); }
  .btn-easy { background: #e8f4ff; color: #1a5fa8; border-color: #1a5fa8; }
  @media (prefers-color-scheme: dark) { .btn-easy { background: #0c1f3a; color: #64a8f5; border-color: #3a6fa8; } }

  input, textarea, select { background: var(--bg); color: var(--text); border: 1px solid var(--border2); border-radius: var(--radius); padding: 9px 12px; font-size: 14px; font-family: inherit; width: 100%; outline: none; transition: border-color 0.15s; }
  input:focus, textarea:focus, select:focus { border-color: var(--text2); }
  textarea { resize: vertical; min-height: 60px; }

  .add-form label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 14px; }
  .add-form label:first-of-type { margin-top: 0; }
  .add-form .tip { font-size: 11px; color: var(--text3); margin-top: 5px; line-height: 1.6; }
  .add-form .tip code { background: var(--bg2); padding: 1px 4px; border-radius: 4px; font-size: 10px; word-break: break-all; }
  .form-row { display: flex; gap: 10px; align-items: center; margin-top: 16px; }
  .btn-primary { background: var(--text); color: var(--bg); border: none; padding: 10px 22px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; flex-shrink: 0; }
  .btn-primary:hover { opacity: 0.85; }
  .add-status { font-size: 13px; color: var(--green); }

  .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .search-row input { flex: 1; }
  .search-row select { width: auto; flex-shrink: 0; }
  .word-list { max-height: 460px; overflow-y: auto; }
  .word-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 6px; background: var(--bg); cursor: pointer; transition: background 0.12s; }
  .word-row:hover { background: var(--bg2); }
  .wr-word { font-size: 14px; font-weight: 500; color: var(--text); }
  .wr-tr { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .wr-stats { text-align: right; font-size: 12px; flex-shrink: 0; margin-left: 12px; }
  .wr-new { font-size: 10px; font-weight: 600; padding: 2px 6px; background: var(--blue-bg); color: var(--blue); border-radius: 99px; margin-left: 6px; vertical-align: middle; }
  .wr-seen { font-size: 10px; color: var(--text3); margin-top: 2px; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
  .ipa { font-size: 17px; color: var(--text3); margin-top: 6px; letter-spacing: 0.02em; font-style: italic; }
  .past-form { font-size: 12px; color: var(--text3); margin-top: 5px; }
  .past-form span { color: var(--text2); font-weight: 500; }
  .pos-tags { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-top: 7px; }
  .pos-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; border: 1px solid var(--border2); color: var(--text3); background: var(--bg2); letter-spacing: 0.03em; }
  .ipa-preview { font-size: 13px; color: var(--blue); margin-top: 5px; min-height: 18px; font-style: italic; letter-spacing: 0.02em; }
  .congrats { text-align: center; padding: 3rem 1rem; }
  .congrats .big { font-size: 48px; margin-bottom: 0.5rem; }
  .congrats h2 { font-size: 20px; font-weight: 600; margin-bottom: 0.5rem; }
  .congrats p { font-size: 14px; color: var(--text2); }

  .loading { text-align: center; padding: 4rem 1rem; color: var(--text3); font-size: 14px; }
  .conn-error { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; line-height: 1.6; margin-bottom: 1rem; }
</style>
</head>
<body>
<div id="app">
  <div id="loading" class="loading">kelimeler yükleniyor...</div>
  <div id="main" style="display:none">
    <div class="header">
      <h1>kelime kartları</h1>
      <div class="stats-bar">
        <div class="stat">✓ <span id="total-correct">0</span></div>
        <div class="stat">✗ <span id="total-wrong">0</span></div>
        <div class="stat"><span id="total-words">0</span> kelime</div>
      </div>
    </div>
    <div class="save-indicator" id="save-indicator"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('study')">çalış</button>
      <button class="tab" onclick="switchTab('review')">yanlışlar</button>
      <button class="tab" onclick="switchTab('list')">kelimeler</button>
      <button class="tab" onclick="switchTab('add')">ekle</button>
      <div style="margin-left:auto;display:flex;align-items:center;padding:0 4px;">
        <span id="session-timer" style="font-size:13px;font-weight:500;color:var(--text3);letter-spacing:0.05em;font-variant-numeric:tabular-nums;">00:00</span>
      </div>
    </div>

    <div id="tab-study">
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <div class="queue-info" id="queue-info"></div>
      <div class="session-bar">
        <div class="session-stat c">✓ <span id="s-correct">0</span></div>
        <div class="session-stat" style="background:var(--bg2);color:#b06000;">△ <span id="s-hard">0</span></div>
        <div class="session-stat w">✗ <span id="s-wrong">0</span></div>
        <div class="session-stat" style="background:#e8f4ff;color:#1a5fa8;">★ <span id="s-easy">0</span></div>
      </div>
      <div id="study-content"></div>
      <div id="actions" style="display:none">
        <div class="actions">
          <button class="btn btn-wrong"   onclick="answer('wrong')">✗ yanlış</button>
          <button class="btn btn-hard"    onclick="answer('hard')">△ zor</button>
          <button class="btn btn-correct" onclick="answer('correct')">✓ doğru</button>
          <button class="btn btn-easy"    onclick="answer('easy')">★ kolay</button>
        </div>
      </div>
    </div>

    <div id="tab-review" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="rev-prog"></div></div>
      <div class="queue-info" id="rev-info"></div>
      <div class="session-bar">
        <div class="session-stat c">✓ <span id="rs-correct">0</span></div>
        <div class="session-stat" style="background:var(--bg2);color:#b06000;">△ <span id="rs-hard">0</span></div>
        <div class="session-stat w">✗ <span id="rs-wrong">0</span></div>
        <div class="session-stat" style="background:#e8f4ff;color:#1a5fa8;">★ <span id="rs-easy">0</span></div>
      </div>
      <div id="review-content"></div>
      <div id="review-actions" style="display:none">
        <div class="actions">
          <button class="btn btn-wrong"   onclick="reviewAnswer('wrong')">✗ yanlış</button>
          <button class="btn btn-hard"    onclick="reviewAnswer('hard')">△ zor</button>
          <button class="btn btn-correct" onclick="reviewAnswer('correct')">✓ doğru</button>
          <button class="btn btn-easy"    onclick="reviewAnswer('easy')">★ kolay</button>
        </div>
      </div>
    </div>

    <div id="tab-list" style="display:none">
      <div class="search-row">
        <input type="text" placeholder="kelime ara..." id="search-input" oninput="renderList()">
        <select id="filter-select" onchange="renderList()">
          <option value="all">hepsi</option>
          <option value="new">yeni</option>
          <option value="hard">zor (&gt;2 yanlış)</option>
          <option value="unseen">hiç görülmemiş</option>
        </select>
      </div>
      <div class="word-list" id="word-list"></div>
    </div>

    <div id="tab-add" style="display:none">
      <div class="add-form">
        <label>İngilizce kelime *</label>
        <input type="text" id="new-word" placeholder="örn. apple" oninput="onWordInput(this.value)">
        <div class="ipa-preview" id="ipa-preview"></div>
        <label>Türkçe çeviri(ler) * (virgülle ayır)</label>
        <textarea id="new-trans" placeholder="örn. elma, alma"></textarea>
        <label>Eş anlamlılar (opsiyonel, virgülle ayır)</label>
        <input type="text" id="new-synonyms" placeholder="örn. option, selection">
        <div class="ipa-preview" id="synonyms-preview" style="color:var(--text3)"></div>
        <label>Ses URL (opsiyonel)</label>
        <input type="text" id="new-audio" placeholder="https://...">
        <label>Past form (opsiyonel)</label>
        <input type="text" id="new-past" placeholder="örn. went, was/were">
        <div class="ipa-preview" id="past-preview" style="color:var(--text3)"></div>
        <label>Örnek cümle (opsiyonel)</label>
        <input type="text" id="new-example" placeholder="örn. He made a good choice.">
        <div class="tip">
          Ses kaynakları:<br>
          • <strong>Forvo.com</strong> → kelimeyi ara → ses linkini kopyala<br>
          • Google TTS: <code>https://translate.google.com/translate_tts?ie=UTF-8&q=KELIME&tl=en&client=tw-ob</code>
        </div>
        <div class="form-row">
          <button class="btn-primary" onclick="addWord()">ekle</button>
          <div class="add-status" id="add-status"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const TWO_WEEKS = 14 * 24 * 60 * 60 * 1000;
let words = [];
let queue = [];
let queueIdx = 0;
let isFlipped = false;
let sessionCorrect = 0;
let sessionWrong = 0;
let sessionHard = 0;
let sessionEasy = 0;
let saveTimer = null;

async function loadWords() {
  try {
    const res = await fetch('/words');
    if (!res.ok) throw new Error('Sunucu hatası: ' + res.status);
    words = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    buildQueue();
    updateStats();
    showCard();
    startTimer();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div class="conn-error">
        <strong>Sunucuya bağlanılamadı.</strong><br>
        Terminalde şu komutu çalıştır:<br><br>
        <code>node server.js</code><br><br>
        Sonra sayfayı yenile (F5).
      </div>`;
  }
}

function saveWords(silent = false) {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if (!silent) setIndicator('saving', 'kaydediliyor...');
    try {
      const res = await fetch('/words', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(words)
      });
      if (!res.ok) throw new Error();
      if (!silent) {
        setIndicator('saved', 'kaydedildi ✓');
        setTimeout(() => setIndicator('', ''), 2000);
      }
    } catch(e) {
      setIndicator('error', 'kaydetme hatası!');
    }
  }, 400);
}

function setIndicator(cls, msg) {
  const el = document.getElementById('save-indicator');
  el.className = 'save-indicator' + (cls ? ' ' + cls : '');
  el.textContent = msg;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const IRREGULAR_VERBS = {"arise":"arose","awake":"awoke","be":"was/were","bear":"bore","beat":"beat","become":"became","begin":"began","bend":"bent","bet":"bet","bind":"bound","bite":"bit","bleed":"bled","blow":"blew","break":"broke","breed":"bred","bring":"brought","broadcast":"broadcast","build":"built","burn":"burned/burnt","buy":"bought","catch":"caught","choose":"chose","come":"came","cost":"cost","cut":"cut","deal":"dealt","dig":"dug","do":"did","draw":"drew","dream":"dreamed/dreamt","drink":"drank","drive":"drove","eat":"ate","fall":"fell","feed":"fed","feel":"felt","fight":"fought","find":"found","flee":"fled","fly":"flew","forget":"forgot","forgive":"forgave","freeze":"froze","get":"got","give":"gave","go":"went","grow":"grew","hang":"hung","have":"had","hear":"heard","hide":"hid","hit":"hit","hold":"held","hurt":"hurt","keep":"kept","know":"knew","lay":"laid","lead":"led","leave":"left","lend":"lent","let":"let","lie":"lay","lose":"lost","make":"made","mean":"meant","meet":"met","pay":"paid","put":"put","read":"read","ride":"rode","ring":"rang","rise":"rose","run":"ran","say":"said","see":"saw","seek":"sought","sell":"sold","send":"sent","set":"set","shake":"shook","shine":"shone","shoot":"shot","show":"showed","shut":"shut","sing":"sang","sink":"sank","sit":"sat","sleep":"slept","slide":"slid","speak":"spoke","spend":"spent","spread":"spread","stand":"stood","steal":"stole","stick":"stuck","strike":"struck","swear":"swore","swim":"swam","take":"took","teach":"taught","tear":"tore","tell":"told","think":"thought","throw":"threw","understand":"understood","wake":"woke","wear":"wore","win":"won","write":"wrote","learn":"learned/learnt","smell":"smelled/smelt","spell":"spelled/spelt"};

function getPastForm(word) {
  const w = word.toLowerCase().trim();
  if (IRREGULAR_VERBS[w]) return IRREGULAR_VERBS[w];
  // Düzenli kural
  if (w.endsWith('e')) return w + 'd';
  if (w.match(/[^aeiou]y$/)) return w.slice(0,-1) + 'ied';
  if (w.match(/[^aeiou][aeiou][^aeioulwxy]$/) && w.length <= 8) return w + w.slice(-1) + 'ed';
  return w + 'ed';
}

function pastFormHTML(w) {
  if (!w.pastForm) return '';
  return `<div class="past-form">geçmiş: <span>${w.pastForm}</span></div>`;
}

const POS_TR = {
  noun: 'isim', verb: 'fiil', adjective: 'sıfat', adverb: 'zarf',
  pronoun: 'zamir', preposition: 'edat', conjunction: 'bağlaç',
  interjection: 'ünlem', numeral: 'sayı', article: 'artikel',
  exclamation: 'ünlem', abbreviation: 'kısaltma'
};

function posTagsHTML(w) {
  if (!w.definitions || !w.definitions.length) return '';
  const poses = [...new Set(w.definitions.map(d => d.pos).filter(Boolean))];
  if (!poses.length) return '';
  return `<div class="pos-tags">${poses.map(p => `<span class="pos-tag">${POS_TR[p] || p}</span>`).join('')}</div>`;
}

function wordScore(w) {
  const now = Date.now();
  const daysSince = w.lastSeen ? (now - new Date(w.lastSeen).getTime()) / 86400000 : 999;
  return (w.wrong||0)*3 + (w.hard||0)*2 - (w.correct||0) + daysSince * 0.5;
}

function buildQueue() {
  const now = Date.now();
  const newW    = words.filter(w => w.isNew);
  const overdue = words.filter(w => !w.isNew && w.lastSeen && (now - new Date(w.lastSeen).getTime()) > TWO_WEEKS);
  const rest    = words.filter(w => {
    if (w.isNew) return false;
    if (overdue.includes(w)) return false;
    // Kolay işaretliyse ve 1 ay geçmemişse atla
    if (w.easy && w.easyDate && (now - new Date(w.easyDate).getTime()) < ONE_MONTH) return false;
    return true;
  }).sort((a, b) => wordScore(b) - wordScore(a));
  queue = [...shuffle(newW), ...overdue, ...rest];
  queueIdx = 0;
  const hardCount = rest.filter(w => (w.wrong||0) > 2 || (w.hard||0) > 1).length;
  const easySkipped = words.filter(w => w.easy && w.easyDate && (now - new Date(w.easyDate).getTime()) < ONE_MONTH).length;
  document.getElementById('queue-info').textContent =
    `${queue.length} kelime sırada — ${newW.length} yeni, ${overdue.length} süresi geçmiş${easySkipped ? ', ' + easySkipped + ' kolay' : ''}`;
}

function updateStats() {
  document.getElementById('total-correct').textContent = words.reduce((s,w)=>s+(w.correct||0),0);
  document.getElementById('total-wrong').textContent   = words.reduce((s,w)=>s+(w.wrong||0),0);
  document.getElementById('total-words').textContent   = words.length;
}

function showCard() {
  const container = document.getElementById('study-content');
  document.getElementById('actions').style.display = 'none';
  isFlipped = false;

  if (queue.length === 0) {
    container.innerHTML = '<div class="congrats"><div class="big">🎉</div><h2>Tebrikler!</h2><p>Tüm kelimeler tamamlandı.</p></div>';
    return;
  }

  const w = queue[queueIdx % queue.length];
  const prog = (queueIdx % queue.length) / queue.length * 100;
  document.getElementById('prog').style.width = prog + '%';

  const audioHTML = w.audioURL
    ? `<button class="audio-btn" id="audio-btn" onclick="playAudio(event)"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>`
    : `<div class="no-audio">ses yok</div>`;

  container.innerHTML = `
    <div class="card-wrap" id="card-wrap" onclick="flipCard()">
      <div class="card-face" id="card-face">
        ${w.isNew ? '<div class="badge-new">yeni</div>' : ''}
        ${audioHTML}
        <div class="word">${w.text}</div>
        ${w.ipa ? `<div class="ipa">${w.ipa}</div>` : ''}
        ${posTagsHTML(w)}
        ${pastFormHTML(w)}
        ${w.synonyms && w.synonyms.length ? `<div style="font-size:12px;color:var(--text3);margin-top:8px;text-align:center;">≈ ${w.synonyms.slice(0,4).join(', ')}</div>` : ''}
        <div class="flip-hint">çeviriyi görmek için tıkla</div>
      </div>
    </div>`;
}

function flipCard() {
  const face = document.getElementById('card-face');
  const w = queue[queueIdx % queue.length];
  if (!isFlipped) {
    isFlipped = true;
    face.style.opacity = '0';
    setTimeout(() => {
      const transFontSize = w.translations.length > 6 ? '14px' : w.translations.length > 3 ? '17px' : '20px';
      const defsHTML = w.definitions && w.definitions.length ? `
        <div style="width:100%;border-top:1px solid var(--border);margin-top:1rem;padding-top:0.75rem;text-align:left;">
          ${w.definitions.slice(0,3).map(d => `
            <div style="margin-bottom:0.75rem;">
              ${d.pos ? `<span style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;">${d.pos}</span>` : '<span style="font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.05em;">örnek</span>'}
              ${d.def ? `<div style="font-size:12px;color:var(--text2);line-height:1.5;margin-top:2px;">${d.def}</div>` : ''}
              ${d.example ? `<div style="font-size:11px;color:var(--text3);font-style:italic;margin-top:3px;">"${d.example}"</div>` : ''}
            </div>`).join('')}
        </div>` : '';
      face.innerHTML = `
        <div class="tr-label">çevirisi</div>
        <div class="translations" style="font-size:${transFontSize}">${w.translations.join('<br>')}</div>
        ${defsHTML}`;
      face.style.justifyContent = 'flex-start';
      face.style.paddingTop = '1.75rem';
      face.style.opacity = '1';
    }, 150);
    document.getElementById('actions').style.display = 'block';
    w.isNew = false;
    w.lastSeen = new Date().toISOString();
    saveWords(true);
  } else {
    face.style.opacity = '0';
    setTimeout(() => {
      const audioHTML = w.audioURL
        ? `<button class="audio-btn" id="audio-btn" onclick="playAudio(event)"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>`
        : `<div class="no-audio">ses yok</div>`;
      face.innerHTML = `
        ${w.isNew ? '<div class="badge-new">yeni</div>' : ''}
        ${audioHTML}
        <div class="word">${w.text}</div>
        ${w.ipa ? `<div class="ipa">${w.ipa}</div>` : ''}
        ${posTagsHTML(w)}
        ${pastFormHTML(w)}
        ${w.synonyms && w.synonyms.length ? `<div style="font-size:12px;color:var(--text3);margin-top:8px;text-align:center;">≈ ${w.synonyms.slice(0,4).join(', ')}</div>` : ''}
        <div class="flip-hint">çeviriyi görmek için tıkla</div>`;
      face.style.justifyContent = 'center';
      face.style.paddingTop = '1.75rem';
      face.style.opacity = '1';
    }, 150);
    isFlipped = false;
    document.getElementById('actions').style.display = 'none';
  }
}

function playAudio(e) {
  e.stopPropagation();
  const w = queue[queueIdx % queue.length];
  if (!w) return;
  if (w.audioURL) {
    const audio = new Audio(w.audioURL);
    audio.play().catch(() => {
      if ('speechSynthesis' in window) {
        const utt = new SpeechSynthesisUtterance(w.text);
        utt.lang = 'en-US'; utt.rate = 0.9;
        window.speechSynthesis.speak(utt);
      }
    });
  } else if ('speechSynthesis' in window) {
    const utt = new SpeechSynthesisUtterance(w.text);
    utt.lang = 'en-US'; utt.rate = 0.9;
    window.speechSynthesis.speak(utt);
  }
}

const ONE_MONTH = 30 * 24 * 60 * 60 * 1000;

function applyAnswer(w, type) {
  if (type === 'correct') {
    w.correct = (w.correct||0)+1;
    w.streak  = (w.streak||0)+1;
  } else if (type === 'hard') {
    w.hard   = (w.hard||0)+1;
    w.streak = 0;
    w.easy   = false;
  } else if (type === 'easy') {
    w.easy      = true;
    w.easyDate  = new Date().toISOString();
    w.streak    = (w.streak||0)+1;
  } else {
    w.wrong  = (w.wrong||0)+1;
    w.streak = 0;
    w.easy   = false;
  }
}

function answer(type) {
  const w = queue[queueIdx % queue.length];
  applyAnswer(w, type);
  if (type === 'correct') { sessionCorrect++; document.getElementById('s-correct').textContent = sessionCorrect; }
  else if (type === 'hard') { sessionHard++; document.getElementById('s-hard').textContent = sessionHard; }
  else if (type === 'easy') { sessionEasy++; document.getElementById('s-easy').textContent = sessionEasy; }
  else { sessionWrong++; document.getElementById('s-wrong').textContent = sessionWrong; }

  // Yanlış veya zor → aynı oturumda 2 kez daha göster (araya 4 kelime girerek)
  if (type === 'wrong' || type === 'hard') {
    const currentPos = queueIdx % queue.length;
    const gap = Math.min(4, queue.length - 1);
    // İki kopya ekle — biri 4 sonra, biri 8 sonra
    const insert1 = currentPos + gap + 1;
    const insert2 = currentPos + gap * 2 + 2;
    queue.splice(Math.min(insert1, queue.length), 0, w);
    queue.splice(Math.min(insert2, queue.length), 0, w);
  }

  saveWords();
  updateStats();
  nextCard();
}

function nextCard() {
  queueIdx++;
  if (queueIdx >= queue.length) buildQueue();
  showCard();
}

function switchTab(tab) {
  currentTab = tab;
  ['study','review','list','add'].forEach(t => document.getElementById('tab-'+t).style.display = t===tab?'block':'none');
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['study','review','list','add'][i]===tab));
  if (tab==='list')   { stopTimer(); renderList(); }
  else if (tab==='add')    { stopTimer(); }
  else if (tab==='study')  { startTimer(); showCard(); }
  else if (tab==='review') { startTimer(); initReview(); }
}

function goToWord(text) {
  const idx = queue.findIndex(w => w.text === text);
  if (idx !== -1) {
    queueIdx = idx;
  } else {
    // Kuyrukta yoksa geçici olarak başa ekle
    const w = words.find(w => w.text === text);
    if (!w) return;
    queue.unshift(w);
    queueIdx = 0;
  }
  switchTab('study');
  showCard();
}

function renderList() {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const f = document.getElementById('filter-select').value;
  const filtered = words.filter(w => {
    if (q && !w.text.toLowerCase().includes(q) && !w.translations.join(' ').toLowerCase().includes(q)) return false;
    if (f==='new'    && !w.isNew) return false;
    if (f==='hard'   && (w.wrong||0)<=2) return false;
    if (f==='unseen' && w.lastSeen) return false;
    return true;
  });
  document.getElementById('word-list').innerHTML = filtered.length ? filtered.map(w => `
    <div class="word-row" onclick="goToWord('${w.text.replace(/'/g, "\\'")}')">
      <div style="flex:1;min-width:0">
        <div class="wr-word">${w.text}${w.isNew?'<span class="wr-new">yeni</span>':''}</div>
        ${w.ipa ? `<div style="font-size:11px;color:var(--text3);font-style:italic;margin-top:1px">${w.ipa}</div>` : ''}
        ${w.definitions && w.definitions.length ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;">${[...new Set(w.definitions.map(d=>d.pos).filter(Boolean))].map(p=>`<span style="font-size:9px;padding:1px 6px;border-radius:99px;border:1px solid var(--border2);color:var(--text3);background:var(--bg2);">${POS_TR[p]||p}</span>`).join('')}</div>` : ''}
        <div class="wr-tr">${w.translations.join(', ')}</div>
      </div>
      <div class="wr-stats">
        <div style="color:var(--green)">✓ ${w.correct||0}</div>
        ${(w.hard||0)>0 ? `<div style="color:#b06000">△ ${w.hard}</div>` : ''}
        <div style="color:var(--red)">✗ ${w.wrong||0}</div>
        <div class="wr-seen">${w.lastSeen ? new Date(w.lastSeen).toLocaleDateString('tr-TR') : 'görülmedi'}</div>
      </div>
    </div>`).join('') : '<div class="empty">kelime bulunamadı.</div>';
}

let ipaTimer = null;
let pendingIPA = null;
let pendingAudio = null;
let pendingSynonyms = [];
let pendingPast = null;

function onWordInput(val) {
  const preview = document.getElementById('ipa-preview');
  pendingIPA = null;
  pendingAudio = null;
  pendingSynonyms = [];
  document.getElementById('new-synonyms').value = '';
  document.getElementById('synonyms-preview').textContent = '';
  preview.textContent = '';
  if (ipaTimer) clearTimeout(ipaTimer);
  const word = val.trim();
  if (word.length < 2) return;
  preview.textContent = 'aranıyor...';
  ipaTimer = setTimeout(async () => {
    try {
      const res = await fetch('/ipa?word=' + encodeURIComponent(word));
      const data = await res.json();
      if (data.ipa) {
        pendingIPA = data.ipa;
        preview.textContent = data.ipa + (data.audioURL ? ' 🔊' : '');
      } else {
        preview.textContent = 'bulunamadı';
        preview.style.color = 'var(--text3)';
      }
      if (data.audioURL) pendingAudio = data.audioURL;
      if (data.synonyms && data.synonyms.length) {
        pendingSynonyms = data.synonyms;
        const synField = document.getElementById('new-synonyms');
        const synPreview = document.getElementById('synonyms-preview');
        if (!synField.value.trim()) synField.value = data.synonyms.join(', ');
        synPreview.textContent = "API'den " + data.synonyms.length + " eş anlamlı bulundu";
      }
      // Past form tahmini — sadece fiil ise öner
      const pastField = document.getElementById('new-past');
      const pastPreview = document.getElementById('past-preview');
      if (!pastField.value.trim()) {
        const isVerb = data.definitions && data.definitions.some(d => d.pos === 'verb');
        if (isVerb) {
          const suggested = getPastForm(word);
          pastPreview.textContent = "tahmini: " + suggested;
          pendingPast = suggested;
        } else {
          pastPreview.textContent = '';
          pendingPast = null;
        }
      }
    } catch(e) {
      preview.textContent = '';
    }
  }, 600);
}

function addWord() {
  const word  = document.getElementById('new-word').value.trim();
  const trans = document.getElementById('new-trans').value.trim();
  const audio    = document.getElementById('new-audio').value.trim() || pendingAudio || null;
  const synRaw   = document.getElementById('new-synonyms').value.trim();
  const synonyms = synRaw ? synRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
  const example   = document.getElementById('new-example').value.trim() || null;
  const pastRaw   = document.getElementById('new-past').value.trim();
  // Sadece manuel giriş veya IPA araması sırasında tespit edildiyse kullan
  const pastForm  = pastRaw || pendingPast || null;
  const existing = words.find(w => w.text.toLowerCase() === word.toLowerCase());
  if (!word) { alert('Kelime zorunlu!'); return; }
  if (!trans && !existing) { alert('Yeni kelime için çeviri zorunlu!'); return; }

  const newTrans = trans.split(',').map(t => t.trim()).filter(Boolean);

  const s = document.getElementById('add-status');

  if (existing) {
    // Eksik çevirileri ekle
    const added = [];
    for (const t of newTrans) {
      if (!existing.translations.map(x => x.toLowerCase()).includes(t.toLowerCase())) {
        existing.translations.push(t);
        added.push(t);
      }
    }
    // Sıfırla ve new yap
    existing.isNew   = true;
    existing.correct = 0;
    existing.wrong   = 0;
    existing.hard    = 0;
    existing.streak  = 0;
    existing.lastSeen = null;
    if (audio) existing.audioURL = audio;
    if (pendingIPA) existing.ipa = pendingIPA;
    if (synonyms.length) {
      const existingSyns = (existing.synonyms || []).map(s => s.toLowerCase());
      synonyms.forEach(s => { if (!existingSyns.includes(s.toLowerCase())) existing.synonyms.push(s); });
    }
    if (example) {
      if (!existing.definitions) existing.definitions = [];
      const manualIdx = existing.definitions.findIndex(d => !d.pos && !d.def);
      if (manualIdx >= 0) existing.definitions[manualIdx].example = example;
      else existing.definitions.push({ pos: null, def: null, example });
    }
    if (pastForm) existing.pastForm = pastForm;

    saveWords(); updateStats(); buildQueue();
    s.textContent = added.length
      ? `"${word}" güncellendi, eklenen: ${added.join(', ')}`
      : `"${word}" zaten vardı, sayaçlar sıfırlandı ve new yapıldı`;
  } else {
    words.push({ text: word, translations: newTrans, audioURL: audio||null, ipa: pendingIPA||null, synonyms: synonyms, definitions: example ? [{ pos: null, def: null, example }] : [], pastForm: pastForm||null, isNew: true, correct: 0, wrong: 0, hard: 0, streak: 0, easy: false, easyDate: null, lastSeen: null });
    saveWords(); updateStats(); buildQueue();
    s.textContent = '"' + word + '" eklendi!';
  }

  document.getElementById('new-word').value = '';
  document.getElementById('ipa-preview').textContent = '';
  pendingIPA = null;
  pendingAudio = null;
  pendingSynonyms = [];
  document.getElementById('new-synonyms').value = '';
  document.getElementById('synonyms-preview').textContent = '';
  document.getElementById('new-trans').value = '';
  document.getElementById('new-audio').value = '';
  document.getElementById('new-example').value = '';
  document.getElementById('new-past').value = '';
  document.getElementById('past-preview').textContent = '';
  pendingPast = null;
  setTimeout(() => s.textContent = '', 3000);
}

// ── REVIEW MODU ─────────────────────────────────────────────
let revQueue = [];
let revIdx   = 0;
let revFlipped = false;
let rsc = 0, rsh = 0, rsw = 0;

function isHard(w) {
  return (w.wrong > 0) && ((w.streak||0) < 3);
}

function initReview() {
  revQueue = shuffle(words.filter(isHard));
  revIdx = 0; rsc = 0; rsh = 0; rsw = 0;
  document.getElementById('rs-correct').textContent = 0;
  document.getElementById('rs-hard').textContent    = 0;
  document.getElementById('rs-wrong').textContent   = 0;
  document.getElementById('rev-info').textContent   =
    revQueue.length + ' kelime — streak<3 ve en az 1 yanlış';
  showReviewCard();
}

function showReviewCard() {
  const container = document.getElementById('review-content');
  document.getElementById('review-actions').style.display = 'none';
  revFlipped = false;

  if (revQueue.length === 0) {
    container.innerHTML = '<div class="congrats"><div class="big">🎉</div><h2>Temiz!</h2><p>Yanlış kelime kalmadı.</p></div>';
    document.getElementById('rev-prog').style.width = '100%';
    return;
  }

  const w = revQueue[revIdx % revQueue.length];
  document.getElementById('rev-prog').style.width = (revIdx % revQueue.length) / revQueue.length * 100 + '%';

  const streakBar = `<div style="font-size:11px;color:var(--text3);margin-bottom:0.75rem;">
    streak ${'●'.repeat(w.streak||0)}${'○'.repeat(Math.max(0,3-(w.streak||0)))}
  </div>`;

  const audioHTML = w.audioURL
    ? `<button class="audio-btn" id="rev-audio-btn" onclick="revPlayAudio(event)"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>`
    : `<div class="no-audio">ses yok</div>`;

  const revBackContent = '';

  container.innerHTML = `
    <div class="card-wrap" onclick="flipReviewCard()">
      <div class="card-face" id="rev-card-face">
        ${streakBar}
        ${audioHTML}
        <div class="word">${w.text}</div>
        ${w.ipa ? `<div class="ipa">${w.ipa}</div>` : ''}
        ${posTagsHTML(w)}
        <div style="font-size:11px;color:var(--text3);margin-top:0.5rem">
          ✗${w.wrong||0} △${w.hard||0} ✓${w.correct||0}
        </div>
        <div class="flip-hint">çeviriyi görmek için tıkla</div>
      </div>
    </div>`;
}

function flipReviewCard() {
  const face = document.getElementById('rev-card-face');
  const w = revQueue[revIdx % revQueue.length];
  if (!revFlipped) {
    revFlipped = true;
    face.style.opacity = '0';
    setTimeout(() => {
      const transFontSize = w.translations.length > 6 ? '14px' : w.translations.length > 3 ? '17px' : '20px';
      const defsHTML = w.definitions && w.definitions.length ? `
        <div style="width:100%;border-top:1px solid var(--border);margin-top:1rem;padding-top:0.75rem;text-align:left;">
          ${w.definitions.slice(0,3).map(d => `
            <div style="margin-bottom:0.75rem;">
              ${d.pos ? `<span style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;">${d.pos}</span>` : '<span style="font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.05em;">örnek</span>'}
              ${d.def ? `<div style="font-size:12px;color:var(--text2);line-height:1.5;margin-top:2px;">${d.def}</div>` : ''}
              ${d.example ? `<div style="font-size:11px;color:var(--text3);font-style:italic;margin-top:3px;">"${d.example}"</div>` : ''}
            </div>`).join('')}
        </div>` : '';
      face.innerHTML = `
        <div class="tr-label">çevirisi</div>
        <div class="translations" style="font-size:${transFontSize}">${w.translations.join('<br>')}</div>
        ${defsHTML}`;
      face.style.justifyContent = 'flex-start';
      face.style.paddingTop = '1.75rem';
      face.style.opacity = '1';
    }, 150);
    document.getElementById('review-actions').style.display = 'block';
    w.lastSeen = new Date().toISOString();
    saveWords(true);
  } else {
    face.style.opacity = '0';
    setTimeout(() => {
      const streakBar = `<div style="font-size:11px;color:var(--text3);margin-bottom:0.75rem;">streak ${String.fromCharCode(9679).repeat(w.streak||0)}${String.fromCharCode(9675).repeat(Math.max(0,3-(w.streak||0)))}</div>`;
      const audioHTML = w.audioURL
        ? `<button class="audio-btn" id="rev-audio-btn" onclick="revPlayAudio(event)"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>`
        : `<div class="no-audio">ses yok</div>`;
      face.innerHTML = `
        ${streakBar}
        ${audioHTML}
        <div class="word">${w.text}</div>
        ${w.ipa ? `<div class="ipa">${w.ipa}</div>` : ''}
        ${posTagsHTML(w)}
        <div style="font-size:11px;color:var(--text3);margin-top:0.5rem">✗${w.wrong||0} △${w.hard||0} ✓${w.correct||0}</div>
        <div class="flip-hint">çeviriyi görmek için tıkla</div>`;
      face.style.justifyContent = 'center';
      face.style.paddingTop = '1.75rem';
      face.style.opacity = '1';
    }, 150);
    revFlipped = false;
    document.getElementById('review-actions').style.display = 'none';
  }
}

function revPlayAudio(e) {
  e.stopPropagation();
  const w = revQueue[revIdx % revQueue.length];
  if (!w) return;
  const src = w.audioURL;
  if (src) {
    new Audio(src).play().catch(() => {
      const u = new SpeechSynthesisUtterance(w.text);
      u.lang = 'en-US'; u.rate = 0.9;
      window.speechSynthesis.speak(u);
    });
  }
}

function reviewAnswer(type) {
  const w = revQueue[revIdx % revQueue.length];
  applyAnswer(w, type);
  if (type === 'correct') { rsc++; document.getElementById('rs-correct').textContent = rsc; }
  else if (type === 'hard') { rsh++; document.getElementById('rs-hard').textContent = rsh; }
  else if (type === 'easy') { sessionEasy++; document.getElementById('rs-easy') && (document.getElementById('rs-easy').textContent = sessionEasy); }
  else { rsw++; document.getElementById('rs-wrong').textContent = rsw; }

  // streak 3'e ulaştıysa listeden çıkar
  if ((w.streak||0) >= 3) {
    revQueue.splice(revIdx % revQueue.length, 1);
    if (revQueue.length === 0) { saveWords(); updateStats(); showReviewCard(); return; }
    revIdx = revIdx % revQueue.length;
  } else {
    // Yanlış veya zor → 4 kelime sonra tekrar göster
    if (type === 'wrong' || type === 'hard') {
      const gap = Math.min(4, revQueue.length - 1);
      const insertAt = (revIdx % revQueue.length) + gap + 1;
      revQueue.splice(Math.min(insertAt, revQueue.length), 0, w);
    }
    revIdx++;
    if (revIdx >= revQueue.length) revIdx = 0;
  }
  saveWords();
  updateStats();
  showReviewCard();
}
// ─────────────────────────────────────────────────────────────

// ── TIMER ────────────────────────────────────────────────────
let timerSeconds = 0;
let timerInterval = null;
let timerActive = false;

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function startTimer() {
  if (timerInterval) return;
  timerActive = true;
  timerInterval = setInterval(() => {
    timerSeconds++;
    document.getElementById('session-timer').textContent = formatTime(timerSeconds);
  }, 1000);
}

function stopTimer() {
  timerActive = false;
  clearInterval(timerInterval);
  timerInterval = null;
}

// Sekme görünürlüğüne göre dur/devam et
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { stopTimer(); }
  else if (['study','review'].includes(currentTab)) { startTimer(); }
});

let currentTab = 'study';
// ─────────────────────────────────────────────────────────────

loadWords();
